name: Daily Proxy Check

on:
  schedule:
    # 每天 UTC 时间 00:00 执行（北京时间早上 8:00）
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许你在 GitHub 网页端手动点击运行进行测试

permissions:
  contents: write # 赋予 Action 推送代码到仓库的权限

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 运行代理检测脚本
        run: python check_proxies.py

      - name: 提交并推送到 GitHub 仓库
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # 添加修改的文件
          git add all.json valid_us_proxies.txt
          
          # 如果有文件发生变化，则 commit 并 push；如果没有变化则跳过，避免报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update valid US proxy IPs" && git push)
