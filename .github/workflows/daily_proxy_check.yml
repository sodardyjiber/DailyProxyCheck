name: Daily Proxy Check

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write 

# 新增这一行：强制 GitHub Actions 提前使用 Node.js 24 环境，从而消除警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 运行代理检测脚本
        run: python check_proxies.py

      - name: 提交并推送到 GitHub 仓库
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add all.json valid_us_proxies.txt
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update valid US proxy IPs" && git push)
